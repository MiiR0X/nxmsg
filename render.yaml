services:
  - type: web
    name: nxmsg-server
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON_BASE64
        sync: false
      - key: NXMSG_DISABLE_WS
        value: "false"
      - key: NXMSG_RENDER_KEEPALIVE_ENABLED
        value: "true"
      - key: NXMSG_KEEPALIVE_INTERVAL_MS
        value: "300000"
      - key: NXMSG_KEEPALIVE_STARTUP_DELAY_MS
        value: "45000"
      - key: NXMSG_KEEPALIVE_TIMEOUT_MS
        value: "15000"
      - key: NXMSG_STUN_URL
        value: "stun:stun.l.google.com:19302"
      - key: NXMSG_TURN_URL
        sync: false
      - key: NXMSG_TURN_USERNAME
        sync: false
      - key: NXMSG_TURN_PASSWORD
        sync: false
